name: Deploy to Back4App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Back4App CLI via Homebrew
        run: |
          brew tap back4app/cli
          brew install back4app-cli
        continue-on-error: true

      - name: Install Back4App CLI via npm
        run: |
          npm install -g @back4app/cli
        continue-on-error: true

      - name: Verify CLI Installation
        run: |
          which b4a
          b4a --version

      - name: Create Parse configuration
        run: |
          cat > .parse.project << 'EOF'
          {
            "projectName": "UnivChicagoCloudCode",
            "appId": "${{ secrets.B4A_APP_ID }}"
          }
          EOF
          cat > .parse.local << 'EOF'
          {
            "${{ secrets.B4A_APP_ID }}": {
              "masterKey": "${{ secrets.B4A_MASTER_KEY }}"
            }
          }
          EOF
          echo "=== Parse Project Config ==="
          cat .parse.project
          echo "=== Parse Local Config (keys redacted) ==="
          wc -l .parse.local

      - name: List Cloud Code Files
        run: |
          echo "=== Cloud Code Directory ==="
          ls -la cloud/
          echo "=== Repository Root ==="
          ls -la

      - name: Deploy Cloud Code to Back4App
        run: |
          echo "Starting deployment with b4a..."
          b4a deploy --verbose
        env:
          HOME: /home/runner
