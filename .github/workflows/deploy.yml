name: Deploy to Back4App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Back4App CLI
        run: npm install -g parse-cli

      - name: Verify B4A credentials
        run: |
          echo "App ID: ${{ secrets.B4A_APP_ID }}"
          echo "Master Key length: ${#B4A_MASTER_KEY}"
        env:
          B4A_MASTER_KEY: ${{ secrets.B4A_MASTER_KEY }}

      - name: Create Parse configuration
        run: |
          cat > .parse.project << 'EOF'
          {
            "projectName": "UnivChicagoCloudCode",
            "appId": "${{ secrets.B4A_APP_ID }}"
          }
          EOF
          cat > .parse.local << 'EOF'
          {
            "${{ secrets.B4A_APP_ID }}": {
              "masterKey": "${{ secrets.B4A_MASTER_KEY }}"
            }
          }
          EOF
          echo "Parse config files created"
          cat .parse.project

      - name: Deploy Cloud Code to Back4App
        run: parse deploy
        env:
          HOME: /home/runner
